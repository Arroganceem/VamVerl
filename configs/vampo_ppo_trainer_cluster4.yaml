# 4 机 × 1 GPU · FSDP FULL_SHARD + per-rank sharded checkpoint（rank0 不载整份 DiT）
#
# 首次开训前在 .31 上转换 checkpoint（一次性，rank0 会载整模）:
#   torchrun --nproc_per_node=4 --nnodes=1 --master_port=29501 \
#     scripts/checkpoint/convert_dreamzero_fsdp_checkpoint.py \
#     --model-path /home/robotem/Models/DreamZero-DROID \
#     --output /home/robotem/Models/DreamZero-DROID-fsdp4
#
# 开训: bash scripts/train/train_component3_rl_cluster4.sh
# 停训: bash scripts/train/train_component3_rl_cluster4.sh stop
defaults:
  - vampo_ppo_trainer
  - _self_

data:
  max_wm_steps: 1          # 原 4/8；每 traj 仅 1 个 WM chunk
  train_batch_size: 1
  n_samples: 2              # GRPO 组最小有效值（原 4/8）

actor_rollout_ref:
  model:
    # 方案 B：LoRA 微调 DiT + projector（低秩增量，DiT 稠密权重冻结）
    rl_fine_tune_mode: lora
    tune_projector: true
    tune_diffusion_model: true
    keep_lora_trainable: true
  actor:
    strategy: fsdp
    ppo_mini_batch_size: 2  # = n_samples
    ppo_micro_batch_size: 1
    optim:
      lr: 5.0e-4
      total_training_steps: 24576
    fsdp_config:
      disable: false
      sequential_block_wrap: true
      # 每 rank 只读 1/4 DiT；T5/VAE/projector 从 replicated.safetensors 各 rank 加载
      sharded_checkpoint_dir: ${oc.env:VAMVERL_FSDP_SHARDED_CHECKPOINT,/home/robotem/Models/DreamZero-DROID-fsdp4}
      # GB10 统一内存：CPU↔GPU 搬迁不腾物理池；只能阶段互斥 + flush/del 释放引用
      # 峰值相位：rollout(KV+VideoMAE) 与 update(激活+Adam瞬时) 严禁重叠
      param_offload: false       # 统一内存下 offload 参数几乎无收益（甚至更慢）
      grad_offload: true         # backward 后尽快丢掉 grad 引用
      optimizer_offload: true    # Adam 仅 step 前后短暂占用，step 前后强制 flush
      wrap_policy:
        transformer_layer_cls_to_wrap:
          - CausalWanAttentionBlock
      fsdp_size: -1
  rollout:
    imagined_frames: 8        # 与 VideoMAE window_size 对齐，reward 无需 pad
    log_prob_micro_batch_size: 1
    tensor_model_parallel_size: 1
  reward:
    backend: videomae
    hf_model_id: /home/robotem/Models/videomae-base
    videomae_checkpoint: ${oc.env:VIDEOMAE_CKPT,./checkpoints/videomae_droid.pth}
    window_size: 8
    min_steps: 8              # 配合 max_wm_steps=1 的短轨迹
    img_size: 224
    batch_size: 8             # 原 32
    device: cpu               # 逻辑 CPU；GB10 仍占统一内存池，rollout 后必须 offload

trainer:
  nnodes: 4
  n_gpus_per_node: 1
  rank0_node_ip: 192.168.88.31
  total_epochs: 24576
  cooldown_every_steps: 1
  cooldown_sec: 60            # step 结束后释放统一内存
  pre_update_cooldown_sec: 30 # rollout→update_actor 等待统一内存池回收（可用 VAMPO_PRE_UPDATE_COOLDOWN_SEC 覆盖）
  experiment_name: vampo_verl_cluster4_fsdp_lora
  runtime_env: none
  default_local_dir: ./outputs/vampo_verl_cluster4_fsdp_lora
