# VideoMAE · 预计算 clip 训练（prep 读 MP4，训练只读 tar）
# 数据准备 → 训练:
#   bash scripts/prep_component2_data_local.sh
#   bash scripts/preflight_component2_train.sh
#   bash scripts/mount_nfs_cluster4.sh clips
#   bash scripts/train_component2_reward_cluster4.sh

data:
  clip_dir: ./data/videomae_droid_clips
  split_dir: ./data/splits
  shuffle_buf: 512
  use_resample: true

model:
  name: /home/robotem/Models/videomae-base
  window: 8
  img_size: 224

train:
  schedule: epoch
  max_epochs: 1
  steps_per_epoch: 3000
  freeze_backbone_epochs: 0      # 0=不冻结，从头全量微调
  unfreeze_last_n_layers: 12     # videomae-base 共 12 层 encoder，12=全 backbone
  batch_size: 16
  val_batch_size: 16
  num_workers: 4
  lr: 1.0e-5
  head_lr: 1.0e-4
  head_lr_finetune: 1.0e-4
  weight_decay: 1.0e-4
  log_every: 10
  loss_ema_beta: 0.99
  grad_clip: 1.0
  max_steps: 12000
  eval_every: 1000
  cooldown_every_steps: 30   # 0=关闭；每 N step 全员 barrier + sleep
  cooldown_sec: 50
  pos_weight: auto

eval:
  thresh_min: 0.3
  thresh_max: 1.0
  thresh_steps: 20

output:
  dir: ./checkpoints

wandb:
  enable: true
  project: vamverl
  run_name: videomae_droid_clips
  group: component2_videomae
  tags: [component2, videomae, droid, clips]
  notes: "Precomputed DROID clip tar · videomae-base"
